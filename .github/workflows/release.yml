name: Deploy docs

on:
  release:
    types: [published]

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and docs dependencies
        run: pip install . mkdocs-material "mkdocstrings[python]>=0.18"
      - name: Deploy docs
        run: mkdocs gh-deploy --force
