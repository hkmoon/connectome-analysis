name: Draft a release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version number (e.g. 1.2.3)'
        required: true

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update version in pyproject.toml
        run: |
          pip install tomli tomli-w
          python -c "
          import tomli, tomli_w, pathlib
          p = pathlib.Path('pyproject.toml')
          data = tomli.loads(p.read_text())
          data['project']['version'] = '${{ github.event.inputs.version }}'
          p.write_text(tomli_w.dumps(data))
          "
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: 'pyproject.toml'
          message: 'Release ${{ github.event.inputs.version }}'
      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
      - name: Create a draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: true
